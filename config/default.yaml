# Default parameters — RT-DETRv2 backend.
# /**  matches any node name/namespace so this file works with all launch files.
# Use with: ros2 launch transformers_bridge fast.launch.py params_file:=/path/to/this/file.yaml

/**:
  ros__parameters:
    backend: "transformers"
    model_name: "PekingU/rtdetr_v2_r18vd"
    threshold: 0.5
    debug: false
    compressed: false
    device: "auto"              # auto | cpu | cuda | cuda:N
    image_size: 640
    camera_info_topic: ""       # e.g. /camera/camera_info
